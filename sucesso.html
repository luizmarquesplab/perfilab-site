<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso | Perfil Lab</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: white; text-align: center; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { max-width: 500px; padding: 40px; }
        .check { font-size: 5rem; color: #2ecc71; margin-bottom: 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #aaa; line-height: 1.6; margin-bottom: 30px; }
        .loader { border: 3px solid #333; border-top: 3px solid #0078d4; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">✓</div>
        <h1>Pagamento Confirmado!</h1>
        <div class="loader"></div>
        <p>Nossa Inteligência Artificial está analisando suas respostas e redigindo seu relatório personalizado agora mesmo.</p>
        <p><strong>Verifique seu e-mail em até 5 minutos.</strong> Não esqueça de checar a caixa de spam!</p>
        <small style="color: #555;">Dúvidas? Suporte: seuemail@empresa.com</small>
    </div>
</body>
</html>
