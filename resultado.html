<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seu Resultado | Perfil Lab</title>
<style>
  * {
    box-sizing: border-box;
  }

 body {
  font-family: 'Segoe UI', sans-serif;
  background: #f0f2f5;
  margin: 0;

  display: flex;
  align-items: center;
  justify-content: center;

  min-height: 100vh;
  padding: 16px;
}

.card {
  background: white;
  width: 100%;
  max-width: 640px;
  padding: 28px 20px;
  border-radius: 24px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

  .score {
    font-size: 4.2rem;
    font-weight: bold;
    color: #0078d4;
    margin: 10px 0;
    line-height: 1;
  }

  .desc {
    font-size: 1rem;
    color: #444;
    line-height: 1.6;
    text-align: left;
    background: #f9f9f9;
    padding: 18px;
    border-radius: 12px;
    margin-top: 25px;
  }

  .btn-pay {
    display: block;
    background: #0078d4;
    color: white;
    padding: 18px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    font-size: 1rem;
    margin-top: 30px;
    transition: 0.3s;
  }

  .btn-pay:hover {
    background: #005fa3;
    transform: scale(1.02);
  }

  .muted {
    font-size: 0.82rem;
    color: #888;
    margin-top: 14px;
  }

  .bar-wrap {
    width: 100%;
    height: 14px;
    background: #e8edf2;
    border-radius: 999px;
    overflow: hidden;
    margin: 18px 0 8px 0;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #0078d4, #38a3ff);
    width: 0%;
    transition: width 0.6s ease;
  }

  @media (max-width: 768px) {
    body {
      padding: 14px 10px;
    }

    .card {
      max-width: 100%;
      padding: 22px 16px;
      border-radius: 18px;
    }

    h1 {
      font-size: 1.6rem;
      line-height: 1.25;
      margin-top: 0;
    }

    .score {
      font-size: 3.2rem;
    }

    .desc {
      font-size: 0.96rem;
      padding: 16px;
    }

    .btn-pay {
      font-size: 0.96rem;
      padding: 16px;
    }
  }

  @media (max-width: 480px) {
    body {
      padding: 10px 8px;
    }

    .card {
      padding: 18px 14px;
      border-radius: 16px;
    }

    h1 {
      font-size: 1.35rem;
    }

    .score {
      font-size: 2.7rem;
    }

    .desc {
      font-size: 0.93rem;
      line-height: 1.5;
      padding: 14px;
    }

    .btn-pay {
      font-size: 0.93rem;
      padding: 15px 14px;
    }

    .muted {
      font-size: 0.78rem;
    }
  }
</style>
</head>
<body>
  <div id="main" class="card" style="display:none;">
    <h1 style="margin-bottom:0;">Análise de <span id="userName"></span></h1>
    <p style="color:#666;">Seu risco de substituição por IA em 2026 é:</p>

    <div class="score"><span id="userScore"></span>%</div>

    <div class="bar-wrap">
      <div id="scoreBar" class="bar-fill"></div>
    </div>

    <div class="desc" id="userDesc"></div>

    <a href="#" id="payLink" class="btn-pay" target="_blank" rel="noopener noreferrer">
      LIBERAR RELATÓRIO PERSONALIZADO
    </a>

    <p class="muted">✓ Resultado calculado com base nas respostas do seu diagnóstico.</p>
  </div>

  <script>
    function montarLinkPagamento(baseUrl, data) {
      const url = new URL(baseUrl);

      url.searchParams.set("locked_prefilled_email", data.email || "");
      url.searchParams.set("client_reference_id", String(data.timestamp || ""));
      url.searchParams.set("utm_source", "perfil_lab");
      url.searchParams.set("utm_medium", "diagnostico");
      url.searchParams.set("utm_campaign", data.product_type || "");

      return url.toString();
    }

    const d = JSON.parse(localStorage.getItem("perfilab_user") || "null");

    if (!d || !d.nome || d.score_percentual === undefined || d.score_percentual === null) {
      window.location.href = "index.html";
    } else {
      document.getElementById("main").style.display = "block";

      const nome = d.nome;
      const score = Number(d.score_percentual || 0);

      document.getElementById("userName").innerText = nome;
      document.getElementById("userScore").innerText = score;
      document.getElementById("scoreBar").style.width = score + "%";

      const desc = document.getElementById("userDesc");
      const link = document.getElementById("payLink");

      if (score >= 70) {
        desc.innerHTML =
          "<strong>CRÍTICO:</strong> Seu perfil está mais exposto a atividades repetitivas, operacionais ou passíveis de automação. O relatório detalhado mostrará os principais vetores de risco, caminhos de reposicionamento e prioridades de adaptação para 2026.";
      } else if (score >= 40) {
        desc.innerHTML =
          "<strong>MODERADO:</strong> Seu perfil está em uma zona intermediária. Há espaço relevante para fortalecimento, aumento de produtividade e diferenciação profissional. O relatório detalhado mostrará onde você pode ganhar vantagem prática no curto prazo.";
      } else {
        desc.innerHTML =
          "<strong>ELITE:</strong> Seu perfil concentra competências mais humanas, analíticas ou estratégicas, menos vulneráveis à substituição direta. O relatório detalhado mostrará como ampliar esse posicionamento e capturar valor com IA, em vez de competir com ela.";
      }

      if (d.payment_link) {
        link.href = montarLinkPagamento(d.payment_link, d);
      } else {
        link.href = "#";
        link.innerText = "LINK DE PAGAMENTO INDISPONÍVEL";
      }
    }
  </script>
</body>
</html>
