<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seu Resultado | Perfil Lab</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      text-align: center;
      padding: 50px 20px;
      margin: 0;
    }

    .card {
      background: white;
      max-width: 640px;
      margin: 0 auto;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .score {
      font-size: 5rem;
      font-weight: bold;
      color: #0078d4;
      margin: 10px 0;
    }

    .desc {
      font-size: 1.05rem;
      color: #444;
      line-height: 1.6;
      text-align: left;
      background: #f9f9f9;
      padding: 20px;
      border-radius: 12px;
      margin-top: 25px;
    }

    .btn-pay {
      display: block;
      background: #0078d4;
      color: white;
      padding: 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1rem;
      margin-top: 30px;
      transition: 0.3s;
    }

    .btn-pay:hover {
      background: #005fa3;
      transform: scale(1.02);
    }

    .muted {
      font-size: 0.85rem;
      color: #888;
      margin-top: 14px;
    }

    .bar-wrap {
      width: 100%;
      height: 14px;
      background: #e8edf2;
      border-radius: 999px;
      overflow: hidden;
      margin: 18px 0 8px 0;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #0078d4, #38a3ff);
      width: 0%;
      transition: width 0.6s ease;
    }
  </style>
</head>
<body>
  <div id="main" class="card" style="display:none;">
    <h1 style="margin-bottom:0;">Análise de <span id="userName"></span></h1>
    <p style="color:#666;">Seu risco de substituição por IA em 2026 é:</p>

    <div class="score"><span id="userScore"></span>%</div>

    <div class="bar-wrap">
      <div id="scoreBar" class="bar-fill"></div>
    </div>

    <div class="desc" id="userDesc"></div>

    <a href="#" id="payLink" class="btn-pay">
    LIBERAR RELATÓRIO PERSONALIZADO
    </a>

    <p class="muted">✓ Resultado calculado com base nas respostas do seu diagnóstico.</p>
  </div>

  <script>

async function iniciarCheckout() {
  const d = JSON.parse(localStorage.getItem("perfilab_user") || "null");
  if (!d) return;

  const response = await fetch("SUA_URL_DO_APPS_SCRIPT_EXEC", {
    method: "POST",
    body: JSON.stringify({
      action: "create_checkout_session",
      nome: d.nome,
      email: d.email,
      product_type: d.product_type,
      score_percentual: d.score_percentual,
      timestamp: String(d.timestamp || "")
    })
  });

  const text = await response.text();
  const result = JSON.parse(text);

  if (!result.ok || !result.checkout_url) {
    throw new Error(result.message || "Falha ao criar checkout.");
  }

  window.location.href = result.checkout_url;
}

document.getElementById("payLink").addEventListener("click", async function(e) {
  e.preventDefault();
  try {
    await iniciarCheckout();
  } catch (err) {
    alert("Erro ao iniciar pagamento: " + err.message);
  }
});
