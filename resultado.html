<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Final | Perfil Lab</title>
    <style>
        :root { --primary: #0078d4; --danger: #e74c3c; --warning: #f39c12; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 40px 20px; }
        .card { background: white; max-width: 700px; width: 100%; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); display: none; text-align: center; }
        .badge { display: inline-block; padding: 10px 20px; border-radius: 50px; color: white; font-weight: bold; margin-bottom: 20px; }
        .report-content { text-align: left; background: #fafafa; padding: 25px; border-radius: 10px; border-left: 5px solid #ddd; margin: 20px 0; line-height: 1.6; }
        .btn-cta { display: block; text-align: center; padding: 20px; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 1.2rem; margin-top: 30px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="denied" class="hidden" style="text-align: center; margin-top: 100px;">
        <h1>Acesso Bloqueado</h1>
        <p>Você precisa completar o diagnóstico para ver o resultado.</p>
        <a href="index.html">Voltar ao início</a>
    </div>

    <div id="result-card" class="card">
        <div id="badge" class="badge"></div>
        <h1>Relatório de <span id="user-name"></span></h1>
        <div class="report-content" id="report-text"></div>
        <p>Seu Score de Risco: <strong id="user-score"></strong>%</p>
        <a href="#" id="cta" class="btn-cta"></a>
    </div>

<script>
    const data = JSON.parse(localStorage.getItem('perfilab_user'));
    const now = new Date().getTime();

    // TRAVA: Se não autorizado ou passou de 1 hora, nega acesso
    if (!data || !data.authorized || (now - data.timestamp > 3600000)) {
        document.getElementById('denied').classList.remove('hidden');
    } else {
        document.getElementById('result-card').style.display = 'block';
        document.getElementById('user-name').innerText = data.name;
        document.getElementById('user-score').innerText = data.score;

        const b = document.getElementById('badge');
        const r = document.getElementById('report-text');
        const c = document.getElementById('cta');

        if (data.score >= 70) {
            b.innerText = "RISCO CRÍTICO"; b.style.backgroundColor = "var(--danger)";
            r.innerHTML = `<strong>Análise:</strong> ${data.name}, seu cargo está na zona de substituição iminente. Nosso algoritmo detectou que as habilidades que você descreveu são o foco principal da automação em 2026. Você precisa migrar para camadas estratégicas agora.`;
            c.innerText = "QUERO MEU PLANO DE TRANSIÇÃO IA"; c.style.backgroundColor = "var(--danger)"; c.href = "LINK_PAGAMENTO_ALTO";
        } else if (data.score >= 40) {
            b.innerText = "RISCO MODERADO"; b.style.backgroundColor = "var(--warning)";
            r.innerHTML = `<strong>Análise:</strong> Sua posição é estável, mas vulnerável à perda de produtividade. Quem domina IA no seu setor ganhará o dobro trabalhando metade do tempo. O relatório enviado para ${data.email} explica como se destacar.`;
            c.innerText = "BAIXAR GUIA DE UPSKILLING"; c.style.backgroundColor = "var(--warning)"; c.href = "LINK_PAGAMENTO_MEDIO";
        } else {
            b.innerText = "PERFIL ELITE"; b.style.backgroundColor = "var(--success)";
            r.innerHTML = `<strong>Análise:</strong> Parabéns. Suas competências são majoritariamente humanas e estratégicas. Seu próximo passo é aprender a gerir ecossistemas de IA para escalar sua influência.`;
            c.innerText = "MENTORIA DE LIDERANÇA IA"; c.style.backgroundColor = "var(--success)"; c.href = "LINK_PAGAMENTO_BAIXO";
        }
    }
</script>
</body>
</html>
