<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Resultado | Perfil Lab</title>
    <style>
        :root { --primary: #0078d4; --danger: #ff4d4d; --warning: #ff9f43; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .card { background: white; max-width: 600px; width: 100%; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; display: none; }
        .badge { display: inline-block; padding: 8px 20px; border-radius: 50px; color: white; font-weight: bold; margin-bottom: 20px; font-size: 0.9rem; }
        h1 { margin: 10px 0; color: #333; }
        .score-box { font-size: 4rem; font-weight: bold; margin: 20px 0; color: var(--primary); }
        .description { text-align: left; background: #f8f9fa; padding: 20px; border-radius: 12px; border-left: 5px solid #ddd; line-height: 1.6; }
        .btn-pay { display: block; background: var(--primary); color: white; text-decoration: none; padding: 20px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; margin-top: 30px; transition: 0.3s; }
        .btn-pay:hover { opacity: 0.9; transform: scale(1.02); }
        .expired { text-align: center; margin-top: 100px; }
    </style>
</head>
<body>
    <div id="result-container" class="card">
        <div id="risk-badge" class="badge"></div>
        <h1>Olá, <span id="display-name"></span>!</h1>
        <p>Seu índice de substituibilidade por IA em 2026 é:</p>
        <div class="score-box"><span id="display-score"></span>%</div>
        <div class="description" id="display-text"></div>
        <a href="#" id="pay-link" class="btn-pay">LIBERAR MEU RELATÓRIO COMPLETO</a>
    </div>

    <div id="error-screen" class="expired" style="display:none;">
        <h1>Sessão Expirada</h1>
        <p>Por segurança, refaça o teste.</p>
        <a href="index.html">Voltar ao início</a>
    </div>

    <script>
        const data = JSON.parse(localStorage.getItem('perfilab_user'));
        const now = new Date().getTime();

        // Trava: Se não houver dados ou passar de 5 min, bloqueia
        if (!data || !data.authorized || (now - data.timestamp > 300000)) {
            document.getElementById('error-screen').style.display = 'block';
        } else {
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('display-name').innerText = data.name;
            document.getElementById('display-score').innerText = data.score;
            
            const badge = document.getElementById('risk-badge');
            const text = document.getElementById('display-text');
            const btn = document.getElementById('pay-link');

            if (data.score >= 70) {
                badge.innerText = "RISCO CRÍTICO"; badge.style.background = "var(--danger)";
                text.innerHTML = "<strong>Diagnóstico:</strong> Suas funções atuais possuem alto potencial de automação por agentes autônomos. Você precisa de um plano de transição urgente.";
                btn.innerText = "LIBERAR PLANO DE TRANSIÇÃO (R$ 97)";
                btn.href = "https://buy.stripe.com/8x26oHgWEbB262s2ey4c802";
            } else if (data.score >= 40) {
                badge.innerText = "RISCO MODERADO"; badge.style.background = "var(--warning)";
                text.innerHTML = "<strong>Diagnóstico:</strong> Você está em uma zona de transição. Sua produtividade pode dobrar com IA, mas sua posição exige atualização de ferramentas.";
                btn.innerText = "BAIXAR GUIA DE UPSKILLING (R$ 47)";
                btn.href = "https://buy.stripe.com/eVqaEX5dW7kMeyY1au4c801";
            } else {
                badge.innerText = "PERFIL ELITE"; badge.style.background = "var(--success)";
                text.innerHTML = "<strong>Diagnóstico:</strong> Seu perfil é altamente estratégico e humano. O próximo nível é aprender a gerir ecossistemas de IA para escalar seus resultados.";
                btn.innerText = "MENTORIA EXECUTIVA IA (R$ 147)";
                btn.href = "https://buy.stripe.com/00wbJ10XGawY62s5qK4c800";
            }
        }
        // Limpa o dado para não permitir múltiplos acessos pelo mesmo link
        localStorage.removeItem('perfilab_user');
    </script>
</body>
</html>
