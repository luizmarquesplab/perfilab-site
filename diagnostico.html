<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico | Perfil Lab</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #quiz-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 500px; width: 90%; }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-next { background: #0078d4; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .option { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 8px; background: none; text-align: left; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .option:hover { border-color: #0078d4; background: #f0f7ff; }
        .progress { background: #eee; height: 8px; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        #bar { background: #0078d4; height: 100%; width: 0%; transition: 0.3s; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="quiz-card">
    <div id="step-lead">
        <h2 style="margin-top:0;">Inicie seu Diagnóstico</h2>
        <p style="color:#666; font-size: 0.9rem;">Preencha para calcular seu risco de substituição pela IA.</p>
        <input type="text" id="name" placeholder="Seu Nome Completo">
        <input type="email" id="email" placeholder="Seu Melhor E-mail">
        <input type="tel" id="phone" placeholder="WhatsApp (com DDD)">
        <button class="btn-next" onclick="start()">Começar Diagnóstico →</button>
    </div>

    <div id="step-quiz" class="hidden">
        <div class="progress"><div id="bar"></div></div>
        <h3 id="q-text" style="min-height: 60px;"></h3>
        <div id="options"></div>
    </div>

    <div id="step-loading" class="hidden" style="text-align:center;">
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #0078d4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto;"></div>
        <h3>Analisando suas respostas...</h3>
        <p>Gerando seu score personalizado para 2026.</p>
    </div>
</div>

<script>
    // URL ATUALIZADA DA SUA NOVA IMPLANTAÇÃO
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwHBcfymDCfn4FjldOZwX248JEd-P7_YCQsc5Y4DOdXd-VxzRSdYTjxHdH9lrIAJMn_/exec";
    
    let scoreTotal = 0;
    let current = 0;
    let userLead = { nome: '', email: '', whatsapp: '' };

    const questions = [
        { q: "1. Sua rotina envolve muitas tarefas repetitivas?", opt: [{t:"Sim, a maior parte do tempo.", p:20}, {t:"Não, meu trabalho é imprevisível.", p:5}] },
        { q: "2. Você já utiliza ferramentas de IA no dia a dia?", opt: [{t:"Ainda não/Muito pouco.", p:15}, {t:"Sim, sou usuário frequente.", p:0}] },
        { q: "3. Qual sua principal área de atuação?", opt: [{t:"Administrativa / Dados / Técnica", p:15}, {t:"Saúde / Educação / Criativa", p:5}] },
        { q: "4. Seu trabalho exige negociações ou empatia humana complexa?", opt: [{t:"Raramente.", p:15}, {t:"O tempo todo.", p:0}] },
        { q: "5. Sua empresa está planejando automações em 2026?", opt: [{t:"Sim, já ouvi falar.", p:15}, {t:"Não ou não sei.", p:5}] }
    ];

    function start() {
        userLead.nome = document.getElementById('name').value;
        userLead.email = document.getElementById('email').value;
        userLead.whatsapp = document.getElementById('phone').value;
        
        if(!userLead.nome || !userLead.email || !userLead.whatsapp) {
            return alert("Por favor, preencha todos os campos.");
        }
        
        document.getElementById('step-lead').classList.add('hidden');
        document.getElementById('step-quiz').classList.remove('hidden');
        show();
    }

    function show() {
        const q = questions[current];
        document.getElementById('q-text').innerText = q.q;
        const div = document.getElementById('options');
        div.innerHTML = '';
        
        q.opt.forEach(o => {
            const b = document.createElement('button');
            b.className = 'option'; 
            b.innerText = o.t;
            b.onclick = () => { 
                scoreTotal += o.p; 
                current++; 
                if(current < questions.length) show(); else send(); 
            };
            div.appendChild(b);
        });
        document.getElementById('bar').style.width = (current/questions.length*100) + "%";
    }

    function send() {
        document.getElementById('step-quiz').classList.add('hidden');
        document.getElementById('step-loading').classList.remove('hidden');
        
        // Objeto final formatado para o Google Script
        const payload = {
            nome: userLead.nome,
            email: userLead.email,
            whatsapp: userLead.whatsapp,
            score: scoreTotal
        };

        // Salva no navegador para a página de resultado usar
        localStorage.setItem('perfilab_user', JSON.stringify(payload));

        // ENVIO PARA A PLANILHA
        fetch(SCRIPT_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload) 
        })
        .then(() => {
            // Pequeno delay para o usuário ver o "Analisando"
            setTimeout(() => { window.location.href = "resultado.html"; }, 1500);
        })
        .catch((error) => {
            console.error("Erro no envio:", error);
            window.location.href = "resultado.html";
        });
    }
</script>
</body>
</html>
