<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico | Perfil Lab</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    #quiz-card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 520px;
      width: 100%;
      box-sizing: border-box;
    }

    .hidden {
      display: none;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .option {
      background: white;
      color: #222;
      border: 2px solid #eaeaea;
      text-align: left;
    }

    .option:hover {
      border-color: #0078d4;
      background: #f3f8ff;
    }

    .progress {
      background: #eee;
      height: 8px;
      border-radius: 4px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    #bar {
      background: #0078d4;
      height: 100%;
      width: 0%;
      transition: 0.3s;
    }

    .error-box {
      margin-top: 12px;
      background: #fff4f4;
      color: #b42318;
      border: 1px solid #f1c0c0;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="quiz-card">
    <div id="step-lead">
      <h2>Inicie seu Diagnóstico</h2>
      <p>Preencha para iniciar.</p>

      <input type="text" id="name" placeholder="Seu nome completo" />
      <input type="email" id="email" placeholder="Seu melhor e-mail" />
      <input type="tel" id="phone" placeholder="WhatsApp com DDD" />

      <button id="startBtn" type="button">Começar Diagnóstico →</button>
      <div id="leadError" class="error-box hidden"></div>
    </div>

    <div id="step-quiz" class="hidden">
      <div class="progress"><div id="bar"></div></div>
      <h3 id="q-text"></h3>
      <div id="options"></div>
    </div>
  </div>

  <script>
    let scoreTotal = 0;
    let current = 0;

    const questions = [
      {
        q: "1. Sua rotina envolve muitas tarefas repetitivas?",
        opt: [
          { t: "Sim, a maior parte do tempo.", p: 20 },
          { t: "Não, meu trabalho é imprevisível.", p: 5 }
        ]
      },
      {
        q: "2. Você já utiliza ferramentas de IA no dia a dia?",
        opt: [
          { t: "Ainda não ou muito pouco.", p: 15 },
          { t: "Sim, sou usuário frequente.", p: 0 }
        ]
      }
    ];

    function showLeadError(message) {
      const box = document.getElementById("leadError");
      box.textContent = message;
      box.classList.remove("hidden");
    }

    function hideLeadError() {
      const box = document.getElementById("leadError");
      box.textContent = "";
      box.classList.add("hidden");
    }

    function validarEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function limparTelefone(telefone) {
      return telefone.replace(/\D/g, "");
    }

    function showQuestion() {
      const q = questions[current];
      document.getElementById("q-text").innerText = q.q;

      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      q.opt.forEach(function(option) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.textContent = option.t;

        button.addEventListener("click", function() {
          scoreTotal += option.p;
          current++;

          if (current < questions.length) {
            showQuestion();
          } else {
            alert("Teste OK. O botão funcionou e o quiz avançou.");
          }
        });

        optionsDiv.appendChild(button);
      });

      document.getElementById("bar").style.width = ((current / questions.length) * 100) + "%";
    }

    function startQuiz() {
      hideLeadError();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = limparTelefone(document.getElementById("phone").value.trim());

      if (!name || !email || !phone) {
        showLeadError("Preencha nome, e-mail e WhatsApp.");
        return;
      }

      if (!validarEmail(email)) {
        showLeadError("Digite um e-mail válido.");
        return;
      }

      if (phone.length < 10) {
        showLeadError("Digite um WhatsApp válido com DDD.");
        return;
      }

      document.getElementById("step-lead").classList.add("hidden");
      document.getElementById("step-quiz").classList.remove("hidden");

      showQuestion();
    }

    document.addEventListener("DOMContentLoaded", function() {
      const startBtn = document.getElementById("startBtn");
      startBtn.addEventListener("click", startQuiz);
      console.log("Diagnóstico carregado com sucesso.");
    });
  </script>
</body>
</html>
