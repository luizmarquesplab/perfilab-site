<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico | Perfil Lab</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    #quiz-card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 560px;
      width: 100%;
      box-sizing: border-box;
    }

    .hidden {
      display: none;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .option {
      background: white;
      color: #222;
      border: 2px solid #eaeaea;
      text-align: left;
    }

    .option:hover {
      border-color: #0078d4;
      background: #f3f8ff;
    }

    .progress {
      background: #eee;
      height: 8px;
      border-radius: 4px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    #bar {
      background: #0078d4;
      height: 100%;
      width: 0%;
      transition: 0.3s;
    }

    .error-box {
      margin-top: 12px;
      background: #fff4f4;
      color: #b42318;
      border: 1px solid #f1c0c0;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .loading-wrap {
      text-align: center;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #0078d4;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    .small-muted {
      color: #666;
      font-size: 14px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="quiz-card">
    <div id="step-lead">
      <h2>Inicie seu Diagnóstico</h2>
      <p>Preencha para calcular seu risco de substituição pela IA.</p>

      <input type="text" id="name" placeholder="Seu nome completo" />
      <input type="email" id="email" placeholder="Seu melhor e-mail" />
      <input type="tel" id="phone" placeholder="WhatsApp com DDD" />

      <button id="startBtn" type="button">Começar Diagnóstico →</button>
      <div id="leadError" class="error-box hidden"></div>
    </div>

    <div id="step-quiz" class="hidden">
      <div class="progress"><div id="bar"></div></div>
      <h3 id="q-text" style="min-height: 60px;"></h3>
      <div id="options"></div>
    </div>

    <div id="step-loading" class="hidden">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <h3>Analisando suas respostas...</h3>
        <p class="small-muted">Gravando seus dados e preparando seu score.</p>
        <div id="sendError" class="error-box hidden"></div>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8ha4RK3IWQRmgUdkpAYDDNGtvK_Ld8_Y7r7Y5GTd4qBF5Df2Cj_xLrixleu41oo48/exec";
    const SCORE_MAXIMO = 80;

    let scoreTotal = 0;
    let current = 0;
    let leadData = null;

    const questions = [
      {
        q: "1. Sua rotina envolve muitas tarefas repetitivas?",
        opt: [
          { t: "Sim, a maior parte do tempo.", p: 20 },
          { t: "Não, meu trabalho é imprevisível.", p: 5 }
        ]
      },
      {
        q: "2. Você já utiliza ferramentas de IA no dia a dia?",
        opt: [
          { t: "Ainda não ou muito pouco.", p: 15 },
          { t: "Sim, sou usuário frequente.", p: 0 }
        ]
      },
      {
        q: "3. Qual sua principal área de atuação?",
        opt: [
          { t: "Administrativa, Dados ou Técnica", p: 15 },
          { t: "Saúde, Educação ou Criativa", p: 5 }
        ]
      },
      {
        q: "4. Seu trabalho exige negociações ou empatia humana complexa?",
        opt: [
          { t: "Raramente.", p: 15 },
          { t: "O tempo todo.", p: 0 }
        ]
      },
      {
        q: "5. Sua empresa está planejando automações em 2026?",
        opt: [
          { t: "Sim, já ouvi falar.", p: 15 },
          { t: "Não ou não sei.", p: 5 }
        ]
      }
    ];

    function showLeadError(message) {
      const box = document.getElementById("leadError");
      box.textContent = message;
      box.classList.remove("hidden");
    }

    function hideLeadError() {
      const box = document.getElementById("leadError");
      box.textContent = "";
      box.classList.add("hidden");
    }

    function showSendError(message) {
      const box = document.getElementById("sendError");
      box.textContent = message;
      box.classList.remove("hidden");
    }

    function hideSendError() {
      const box = document.getElementById("sendError");
      box.textContent = "";
      box.classList.add("hidden");
    }

    function validarEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function limparTelefone(telefone) {
      return telefone.replace(/\D/g, "");
    }

    function calcularScorePercentual(scoreBruto) {
      return Math.round((scoreBruto / SCORE_MAXIMO) * 100);
    }

    function showQuestion() {
      const q = questions[current];
      document.getElementById("q-text").innerText = q.q;

      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      q.opt.forEach(function(option) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.textContent = option.t;

        button.addEventListener("click", function() {
          scoreTotal += option.p;
          current++;

          if (current < questions.length) {
            showQuestion();
          } else {
            finalizeQuiz();
          }
        });

        optionsDiv.appendChild(button);
      });

      document.getElementById("bar").style.width = ((current / questions.length) * 100) + "%";
    }

    function startQuiz() {
      hideLeadError();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim().toLowerCase();
      const phone = limparTelefone(document.getElementById("phone").value.trim());

      if (!name || !email || !phone) {
        showLeadError("Preencha nome, e-mail e WhatsApp.");
        return;
      }

      if (!validarEmail(email)) {
        showLeadError("Digite um e-mail válido.");
        return;
      }

      if (phone.length < 10) {
        showLeadError("Digite um WhatsApp válido com DDD.");
        return;
      }

      leadData = {
        nome: name,
        email: email,
        whatsapp: phone
      };

      document.getElementById("step-lead").classList.add("hidden");
      document.getElementById("step-quiz").classList.remove("hidden");

      showQuestion();
    }

    async function finalizeQuiz() {
      document.getElementById("step-quiz").classList.add("hidden");
      document.getElementById("step-loading").classList.remove("hidden");
      hideSendError();

      const payload = {
        action: "lead_capture",
        nome: leadData.nome,
        email: leadData.email,
        whatsapp: leadData.whatsapp,
        score_bruto: scoreTotal,
        score_percentual: calcularScorePercentual(scoreTotal),
        timestamp: Date.now(),
        origem: "diagnostico_html"
      };

      localStorage.setItem("perfilab_user", JSON.stringify(payload));

      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });

        const text = await response.text();

        let result;
        try {
          result = JSON.parse(text);
        } catch (e) {
          throw new Error("Resposta do Apps Script não é JSON válido.");
        }

        if (!result.ok) {
          throw new Error(result.message || "Falha ao gravar lead.");
        }

        const stored = JSON.parse(localStorage.getItem("perfilab_user") || "{}");
        stored.payment_link = result.payment_link || "";
        stored.product_type = result.product_type || "";
        localStorage.setItem("perfilab_user", JSON.stringify(stored));

        window.location.href = "resultado.html";
      } catch (error) {
        console.error("Erro ao enviar lead:", error);
        showSendError("Erro ao registrar os dados:\n" + error.message);
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      document.getElementById("startBtn").addEventListener("click", startQuiz);
    });
  </script>
</body>
</html>
